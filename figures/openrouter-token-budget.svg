<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">OpenRouter affordable output token budget decline</title>
  <desc id="desc">Line chart of provider-reported affordable output tokens from OpenRouter HTTP 402 errors: 1422 at 04:05, 994 at 04:12, 784 at 04:13, and 669 at 04:15 UTC on 2026-05-11.</desc>
  <style>
    .bg { fill: #ffffff; }
    .axis { stroke: #1f2937; stroke-width: 1.4; }
    .grid { stroke: #d1d5db; stroke-width: 1; stroke-dasharray: 4 5; }
    .line { fill: none; stroke: #dc2626; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
    .point { fill: #dc2626; stroke: #ffffff; stroke-width: 2; }
    .label { fill: #111827; font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .small { fill: #374151; font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { fill: #111827; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
  <rect class="bg" x="0" y="0" width="760" height="360"/>
  <text class="title" x="80" y="28">OpenRouter affordable output tokens fell during retries</text>
  <text class="small" x="80" y="48">Provider-reported affordable output-token cap from HTTP 402 errors, 2026-05-11 UTC</text>

  <line class="grid" x1="80" y1="64.4" x2="690" y2="64.4"/>
  <line class="grid" x1="80" y1="113.3" x2="690" y2="113.3"/>
  <line class="grid" x1="80" y1="162.2" x2="690" y2="162.2"/>
  <line class="grid" x1="80" y1="211.1" x2="690" y2="211.1"/>
  <line class="grid" x1="80" y1="260" x2="690" y2="260"/>

  <line class="axis" x1="80" y1="40" x2="80" y2="260"/>
  <line class="axis" x1="80" y1="260" x2="690" y2="260"/>

  <text class="small" x="42" y="68.4">1400</text>
  <text class="small" x="42" y="117.3">1200</text>
  <text class="small" x="42" y="166.2">1000</text>
  <text class="small" x="49" y="215.1">800</text>
  <text class="small" x="49" y="264">600</text>
  <text class="small" transform="translate(18 198) rotate(-90)">affordable output tokens</text>

  <polyline class="line" points="80,59.1 283.3,163.7 486.7,215.0 690,243.1"/>

  <circle class="point" cx="80" cy="59.1" r="5"/>
  <circle class="point" cx="283.3" cy="163.7" r="5"/>
  <circle class="point" cx="486.7" cy="215.0" r="5"/>
  <circle class="point" cx="690" cy="243.1" r="5"/>

  <text class="label" x="64" y="50">1422</text>
  <text class="label" x="270" y="154">994</text>
  <text class="label" x="474" y="205">784</text>
  <text class="label" x="678" y="233">669</text>

  <text class="small" x="56" y="284">04:05</text>
  <text class="small" x="259" y="284">04:12</text>
  <text class="small" x="462" y="284">04:13</text>
  <text class="small" x="666" y="284">04:15</text>
  <text class="small" x="281" y="318">OpenRouter retry time, 2026-05-11 UTC</text>
</svg>
